name: mpx
description: "MPx Player - A modern video player built with Flutter"
publish_to: "none"
version: 2.1.4+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # flutter_mpv - Video player with mpv backend
  flutter_mpv: ^1.2.12
  flutter_mpv_video: ^2.0.4
  flutter_mpv_libs_video: ^1.0.11

  # UI
  cached_network_image: ^3.4.1
  file_picker: ^10.3.2
  google_fonts: ^6.2.1

  # Utilities
  http: ^1.5.0
  path: ^1.8.3
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.2
  uuid: ^4.5.1
  wakelock_plus: ^1.2.4
  provider: ^6.1.5+1
  flutter_volume_controller: ^1.3.0
  screen_brightness: ^2.0.1
  simple_pip_mode: ^1.1.0
  # file_picker: ^8.0.0 # Removed file_picker

  # Database
  sqflite: ^2.3.0

  # Video Metadata & Thumbnails
  video_thumbnail: ^0.5.6
  media_data_extractor: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  mockito: ^5.4.4
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/splash-bg.png
    - assets/thumbnails/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#6366F1"
  adaptive_icon_foreground: "assets/images/logo.png"
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#6366F1"
    theme_color: "#6366F1"
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/logo.png"
